services:
  mysql:
    image: mysql:9
    container_name: shorturl-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - 3306:3306
      - 33060:33060
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:8
    container_name: shorturl-redis
    ports:
      - 6379:6379

volumes:
  mysql-data:
    name: shorturl-mysql-data
